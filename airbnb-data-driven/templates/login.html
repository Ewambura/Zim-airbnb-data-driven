{% extends "base.html" %}

{% block title %}Login - ZimBnB{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p>Sign in to continue to ZimBnB</p>
        </div>

        <div class="auth-body">
            {% if msg %}
            <div class="alert alert-error">
                {{ msg }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" name="email" id="email" placeholder="you@example.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">
                    Sign In
                </button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <div class="auth-links">
                <p>Don't have an account? <a href="/register">Create one</a></p>
            </div>

            <a href="/properties" class="browse-link">Browse properties as guest</a>
        </div>
    </div>
</div>
{% endblock %}
